<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookShelf</title>
  <link rel="stylesheet" href="frontend/css/style.css" />
</head>
<body>

  <header id="cabecalho">GERENCIAMENTO DE BIBLIOTECAS</header>

  <main id="conteudo-principal">

    <section id="secao-formulario">
      <h2>Adicionar Livro</h2>

      <div id="formulario-livro">

        <div class="grupo-campo">
          <label for="campo-titulo">Título</label>
          <input type="text" id="campo-titulo" placeholder="Ex: Dom Casmurro" />
        </div>

        <div class="grupo-campo">
          <label for="campo-autor">Autor</label>
          <input type="text" id="campo-autor" placeholder="Ex: Machado de Assis" />
        </div>

        <div class="grupo-campo">
          <label for="campo-ano">Ano</label>
          <input type="number" id="campo-ano" placeholder="Ex: 1899" />
        </div>

        <button id="botao-adicionar">Adicionar</button>

      </div>

      <p id="mensagem-feedback"></p>
    </section>

    <section id="secao-lista">
      <div id="cabecalho-lista">
        <h2>Meus Livros</h2>
        <span id="contador-livros">0 livros</span>
      </div>

      <div id="lista-livros">
        <!-- cards inseridos via JS -->
      </div>
    </section>

  </main>

  <script src="frontend/js/script.js"></script>

</body>
</html>
